<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Herbst UI</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      try {
        var herbstTheme = localStorage.getItem('herbst-theme');
        if (
          herbstTheme === 'dark' ||
          (!herbstTheme && matchMedia('(prefers-color-scheme: dark)').matches)
        )
          document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="leaf.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
